esphome:
  name: hcpbridge

external_components:
  source: github://twratajczak/esphome-hcpbridge

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

api:
  encryption:
    key: !secret api_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

ota:
 - platform: esphome


uart:
  tx_pin: GPIO17
  rx_pin: GPIO18
  baud_rate: 57600
  data_bits: 8
  stop_bits: 1
  parity: EVEN

hcpbridge:
  id: hcpbridge_id

cover:
  - platform: hcpbridge

binary_sensor:
  - platform: hcpbridge

light:
  - platform: hcpbridge
